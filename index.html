<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Calculator for Scholarship</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <h2>GPA Calculator</h2>
    
    <div class="input-section">
      <input type="text" id="subject" placeholder="Subject Name (EX: Web design)">
      <input type="number" id="credits" placeholder="Credit (EX: 3)">
      <input type="number" id="score" step="0.1" placeholder="Grade (EX: 3.5)">
      <button id="addBtn">Add Subject</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Subject</th>
          <th>Credits</th>
          <th>Grade</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="subjectList">
        </tbody>
    </table>

    <h3>GPA Currently: <span id="gpaResult">0.00</span></h3>
  </div>

  <script src="lib.js"></script>
</body>
</html>
